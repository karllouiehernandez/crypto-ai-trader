name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          BINANCE_API_KEY: ci_fake_key
          BINANCE_API_SECRET: ci_fake_secret
          TELEGRAM_TOKEN: ci_fake_token
          TELEGRAM_CHAT_ID: "123456789"
          LLM_ENABLED: "false"
          ANTHROPIC_API_KEY: ci_fake_anthropic_key
          GROQ_API_KEY: ci_fake_groq_key
          OPENROUTER_API_KEY: ci_fake_openrouter_key
          MCP_API_KEY: ci_test_mcp_key
        run: pytest tests/ -v --tb=short
